<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goofy ahh</title>
</head>
<body>
    <h1>welcome to the goofy ahh page</h1>
    <p>click the button for a goofy ahh image</p>
    <button id="load-image">button</button>

    <div id="image-container">
        <img id="random-image" src="https://via.placeholder.com/500x300" alt="Random Image">
    </div>

    <script>
        const images = [
            "https://i.pinimg.com/236x/5c/4f/ff/5c4fff33bfb9670632616d86a22906a4.jpg",
            "https://i.pinimg.com/474x/44/00/c0/4400c0f5abe6f4ce90474758e1ca9c44.jpg",
            "https://i.pinimg.com/236x/75/33/cc/7533cc4662eb0d6bc3eed627c63828bb.jpg"
        ];

        const button = document.getElementById("load-image");
        const img = document.getElementById("random-image");

        button.addEventListener("click", function() {
            const randomIndex = Math.floor(Math.random() * images.length);
            img.src = images[randomIndex];
        });
    </script>
</body>
</html>
