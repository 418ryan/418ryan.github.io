<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>goofy ahh</title>
</head>
<body>
    <h1>welcome to the goofy ahh page</h1>
    <p>click the button for a goofy ahh image</p>

            "https://i.pinimg.com/236x/3b/92/e9/3b92e946f4c375708153cb795906dfff.jpg",

        const button = document.getElementById("load-image");
        const img = document.getElementById("random-image");

        button.addEventListener("click", function() {
            const randomIndex = Math.floor(Math.random() * images.length);
            img.src = images[randomIndex];
        });
    </script>
</body>
</html>
